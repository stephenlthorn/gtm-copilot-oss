services:
  # TiDB (local standalone — MySQL-compatible with vector search support)
  tidb:
    image: pingcap/tidb:v8.5.0
    ports:
      - "4000:4000"   # MySQL-compatible protocol
      - "10080:10080" # TiDB status / metrics
    volumes:
      - tidb_data:/tmp/tidb
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:10080/status"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  # One-shot service: create the `gtm_copilot` database inside TiDB
  init-db:
    image: mysql:8.0
    command: >
      mysql -h tidb -P 4000 -u root --connect-timeout=10
            -e "CREATE DATABASE IF NOT EXISTS gtm_copilot CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
    depends_on:
      tidb:
        condition: service_healthy
    restart: on-failure

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: ..
      dockerfile: api/Dockerfile
    env_file:
      - ../.env
    environment:
      DATABASE_URL: mysql+pymysql://root:@tidb:4000/gtm_copilot
      DATABASE_PROVIDER: tidb
      REDIS_URL: redis://redis:6379/0
      SENTRY_DSN: ${SENTRY_DSN:-}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      init-db:
        condition: service_completed_successfully
      redis:
        condition: service_started
    volumes:
      - ../data:/app/data
      - ~/.codex:/root/.codex:ro
    ports:
      - "8000:8000"

  worker:
    build:
      context: ..
      dockerfile: api/Dockerfile
    env_file:
      - ../.env
    environment:
      DATABASE_URL: mysql+pymysql://root:@tidb:4000/gtm_copilot
      DATABASE_PROVIDER: tidb
      REDIS_URL: redis://redis:6379/0
      SENTRY_DSN: ${SENTRY_DSN:-}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      init-db:
        condition: service_completed_successfully
      redis:
        condition: service_started
    volumes:
      - ../data:/app/data
      - ~/.codex:/root/.codex:ro
    command: celery -A app.worker.celery_app worker --loglevel=info

  beat:
    build:
      context: ..
      dockerfile: api/Dockerfile
    env_file:
      - ../.env
    environment:
      DATABASE_URL: mysql+pymysql://root:@tidb:4000/gtm_copilot
      DATABASE_PROVIDER: tidb
      REDIS_URL: redis://redis:6379/0
      SENTRY_DSN: ${SENTRY_DSN:-}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      init-db:
        condition: service_completed_successfully
      redis:
        condition: service_started
    volumes:
      - ../data:/app/data
      - ~/.codex:/root/.codex:ro
    command: celery -A app.worker.celery_app beat --loglevel=info

  ui:
    build:
      context: ..
      dockerfile: ui/Dockerfile
      args:
        GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
        GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
        NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    env_file:
      - ../.env
    environment:
      API_BASE_URL: http://api:8000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
      - "1455:1455"
    depends_on:
      - api

volumes:
  tidb_data:
